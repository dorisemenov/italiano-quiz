<!doctype html>
<html lang="en">
<head>

  <title>Italian Verb Drill</title>

    main { width: min(1500px, 100%); display: grid; grid-template-columns: minmax(0, 1fr) 240px; gap: 12px; }
    section, aside { background: white; border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 18px 50px #0002; }
    section { padding: clamp(14px, 2vw, 22px); }
    aside { padding: 14px; align-self: start; display: grid; gap: 10px; }
    h1 { margin: 0; font-size: clamp(1.25rem, 2.2vw, 1.75rem); letter-spacing: 0; }
    .top { display: flex; justify-content: space-between; gap: 16px; align-items: start; margin-bottom: 14px; }
    #counter, .muted { color: var(--muted); font-weight: 650; }
    #sentence { font: clamp(1.45rem, 3vw, 2.65rem)/1.12 Georgia, "Times New Roman", serif; margin: 0 0 16px; padding: 18px 0; border-block: 1px solid var(--line); }
    .grid { display: grid; grid-template-columns: 210px minmax(720px, 1fr); gap: 18px; align-items: start; }
    fieldset { border: 0; padding: 0; margin: 0; }
#tenses { display: grid; grid-template-columns: repeat(2, minmax(260px, 1fr)); gap: 12px 16px; align-items: start; }
.tense-stack { display: grid; gap: 12px; min-width: 0; }
.tense-group { min-width: 0; }
.tense-group-title { color: var(--muted); font-size: .78rem; font-weight: 850; text-transform: uppercase; margin: 0 0 5px; }
    legend { font-weight: 850; margin-bottom: 6px; }
    label { display: grid; grid-template-columns: 20px 1fr; gap: 8px; align-items: center; min-height: 34px; padding: 6px 9px; margin: 5px 0; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfa; cursor: pointer; font-weight: 700; font-size: .94rem; }
    label.answer-correct { background: #e7f5ec; border-color: #8fcfa6; color: #115f34; }
    label.answer-wrong { background: #fae9e7; border-color: #e2aaa4; color: #9d2f28; }
    input[type="radio"] { width: 16px; height: 16px; accent-color: var(--accent); }
    button { margin-top: 12px; margin-right: 7px; padding: 9px 13px; border: 0; border-radius: 8px; font: inherit; font-weight: 850; cursor: pointer; background: #e8eee9; color: var(--ink); }
    button.primary { background: var(--accent); color: white; }
    button.primary:hover { background: var(--accent-dark); }
    #feedback { display: none; font-weight: 800; margin: 12px 0 0; padding: 10px 12px; border-radius: 8px; }
    #feedback[hidden] { display: none; }
    #feedback.show { display: block; }
    #feedback[hidden], #feedback.show[hidden] { display: none !important; }
    .conjugation-panel { margin-top: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfa; overflow: hidden; }
    .conjugation-title { padding: 9px 11px; font-weight: 850; border-bottom: 1px solid var(--line); background: #f1f5f2; }
    .conjugation-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .conjugation-row { display: grid; grid-template-columns: 70px 1fr; gap: 8px; padding: 8px 11px; border-top: 1px solid #edf1ee; }
    .conjugation-row:nth-child(1), .conjugation-row:nth-child(2) { border-top: 0; }
    .conjugation-person { color: var(--muted); font-weight: 850; }
    .conjugation-form { font-weight: 760; }
    #feedback.correct { color: var(--good); background: var(--soft-good); border: 1px solid #acd7bb; }
    #feedback.wrong, #feedback.warn { color: var(--bad); background: var(--soft-bad); border: 1px solid #e6bab6; }
    .score { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .score div { border: 1px solid var(--line); border-radius: 8px; padding: 9px; background: #fbfcfa; }
    .score strong { display: block; font-size: 1.45rem; }
    textarea { width: 100%; min-height: 120px; resize: vertical; border: 1px solid var(--line); border-radius: 8px; padding: 10px; font: 13px ui-monospace, Consolas, monospace; }
    .side-actions button { width: 100%; margin: 6px 0 0; }
    .import-tools { border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; background: #fbfcfa; }
    .import-tools summary { cursor: pointer; font-weight: 850; }
    .import-tools:not([open]) { padding-bottom: 9px; }
    .small { font-size: .9rem; color: var(--muted); line-height: 1.35; }
    @media (max-width: 1250px) { main { grid-template-columns: 1fr; } aside { grid-template-columns: 240px 1fr; align-items: start; } }
    @media (max-width: 1100px) { .grid { grid-template-columns: 190px minmax(0, 1fr); } #tenses { grid-template-columns: repeat(2, minmax(230px, 1fr)); } }
    @media (max-width: 820px) { main, .grid, #tenses { grid-template-columns: 1fr; } .top { display: block; } }
      .version-stamp { grid-column: 1 / -1; text-align: center; color: #8b948e; font-size: .78rem; margin-top: 2px; }
  </style>
</head>

    <p id="feedback" aria-live="polite" hidden></p>
    <div id="conjugationPanel" class="conjugation-panel" hidden></div>
  </section>

      <textarea id="importBox" spellcheck="false" placeholder='[{"sentence":"Sto studiando la grammatica.","person":"io","tense":"presente progressivo","translation":"I am studying grammar."}]'></textarea>
      <div class="side-actions">
        <button type="button" id="copyPrompt">Copy ChatGPT prompt</button>

    </details>
  </aside>
</main>

function clearAnswerHighlights() { document.querySelectorAll("label.answer-correct, label.answer-wrong").forEach(label => label.classList.remove("answer-correct", "answer-wrong")); }

function markCheckedAnswers(person, tense) { clearAnswerHighlights(); markChoice("person", current.person, "answer-correct"); markChoice("tense", current.tense, "answer-correct"); if (person !== current.person) markChoice("person", person, "answer-wrong"); if (tense !== current.tense) markChoice("tense", tense, "answer-wrong"); }
function hideFeedback() { feedback.hidden = true; feedback.className = ""; feedback.textContent = ""; }
function show(kind, text) { feedback.hidden = false; feedback.className = 'show ' + kind; feedback.textContent = text; }
function translationLine() { return current.translation ? " Translation: " + current.translation : ""; }
function hideConjugation() { conjugationPanel.hidden = true; conjugationPanel.innerHTML = ""; }
function resetAnswerState() {
  clearSelections();
  clearAnswerHighlights();
  hideConjugation();
  hideFeedback();
  explainButton.hidden = true;
  document.querySelectorAll("label.answer-correct, label.answer-wrong").forEach(label => label.classList.remove("answer-correct", "answer-wrong"));
}
function showConjugation() {
  if (!current.verb || !endings[current.verb]?.[current.tense]) { hideConjugation(); return; }
  const forms = endings[current.verb][current.tense];
  conjugationPanel.hidden = false;
  conjugationPanel.innerHTML = '<div class="conjugation-title">' + current.verb + ' - ' + current.tense + '</div><div class="conjugation-grid">' + people.map(person => '<div class="conjugation-row"><span class="conjugation-person">' + person + '</span><span class="conjugation-form">' + forms[person] + '</span></div>').join("") + '</div>';
}
function explainCurrent() {
  const formText = current.form || current.sentence.split(/\s+/).slice(0, 2).join(" ") || "the verb";
  const meaning = current.verb ? " The infinitive " + current.verb + " means " + (verbMeanings[current.verb] || "this verb") + "." : "";
  const translation = current.translation ? " Translation: " + current.translation : "";
  return formText + " is " + current.person + " in the " + current.tense + "." + meaning + " " + (tenseHints[current.tense] || "Look at the verb form and auxiliary to identify the tense.") + translation;
}
function updateScore() { correctCount.textContent = correct; attemptCount.textContent = attempts; }
function clearQuizUrl() { if (typeof location !== "undefined" && location.search) history.replaceState(null, "", location.pathname); }
function availablePairs() {
  const pairs = [];
  for (const verb of Object.keys(endings)) {
    for (const tense of tenses) {
      if (!endings[verb][tense]) continue;
      for (const person of people) {
        const formText = endings[verb][tense][person];
        const duplicateCount = people.filter(other => endings[verb][tense]?.[other] === formText).length;
        if (duplicateCount === 1) pairs.push({ verb, tense, person, form: formText });
      }
    }
  }
  return pairs;
}
const localPairs = availablePairs();
function englishVerbPhrase(pair) {
  if (pair.verb === "essere") return essereTranslationTemplates[pair.tense]?.[pair.person] || "be";
  const base = {
    parlare: "speak",
    finire: "finish",
    dormire: "sleep"
  }[pair.verb] || pair.verb;
  const third = { parlare: "speaks", finire: "finishes", dormire: "sleeps" }[pair.verb] || base;
  const gerund = { parlare: "speaking", finire: "finishing", dormire: "sleeping" }[pair.verb] || base;
  const past = { parlare: "spoken", finire: "finished", dormire: "slept" }[pair.verb] || base;
  const simplePast = { parlare: "spoke", finire: "finished", dormire: "slept" }[pair.verb] || base;
  const bePresent = { io: "am", tu: "are", "lui/lei": "is", noi: "are", voi: "are", loro: "are" }[pair.person];
  const bePast = { io: "was", tu: "were", "lui/lei": "was", noi: "were", voi: "were", loro: "were" }[pair.person];
  switch (pair.tense) {
    case "presente": return pair.person === "lui/lei" ? third : base;
    case "presente progressivo": return bePresent + " " + gerund;
    case "passato prossimo": return simplePast + " / have " + past;
    case "imperfetto": return bePast + " " + gerund + " / used to " + base;
    case "trapassato prossimo": return "had " + past;
    case "futuro semplice": return "will " + base;
    case "futuro anteriore": return "will have " + past;
    case "condizionale presente": return "would " + base;
    case "condizionale passato": return "would have " + past;
    default: return base;
  }
}
function makeTranslation(pair, extra, context) {
  const subject = personMeanings[pair.person] || pair.person;
  const verbPhrase = englishVerbPhrase(pair);
  const extraMeaning = pair.verb === "essere" ? (adjectiveMeanings[extra] || extra) : (context?.en || extra);
  return subject + " " + verbPhrase + " " + extraMeaning + ".";
}
function makeLocalQuestion() {
  const pair = choice(localPairs);
  let extra = "";
  let context = null;
  if (pair.verb === "essere") {
    const adjectiveKey = choice(adjectives);
    extra = adjectiveForms[adjectiveKey][pair.person];
  } else {
    context = choice(verbContexts[pair.verb]);
    extra = context.it;
  }
  return { sentence: capitalize(pair.form + " " + extra + "."), person: pair.person, tense: pair.tense, verb: pair.verb, form: pair.form, translation: makeTranslation(pair, extra, context) };
}
function normalizePerson(value) {
  const v = String(value || "").toLowerCase().trim();
  if (["io", "tu", "noi", "voi", "loro"].includes(v)) return v;
  if (["lui", "lei", "egli", "ella", "lui/lei", "3rd person singular"].includes(v)) return "lui/lei";
  return "";
}
function normalizeVerb(value) {
  const v = String(value || "").toLowerCase().trim();
  return endings[v] ? v : "";
}
function inferVerbFromSentence(sentenceText, tense, person) {
  const clean = String(sentenceText || "").toLowerCase();
  for (const verb of Object.keys(endings)) {
    const formText = endings[verb]?.[tense]?.[person];
    if (formText && clean.includes(formText.toLowerCase())) return { verb, form: formText };
  }
  return { verb: "", form: "" };
}
function normalizeTense(value) {
  const v = String(value || "").toLowerCase().trim();
  const aliases = {
    present: "presente",
    "present progressive": "presente progressivo",
    "presente progressiva": "presente progressivo",
    "present perfect": "passato prossimo",
    imperfect: "imperfetto",
    future: "futuro semplice",
    conditional: "condizionale presente",
    condizionale: "condizionale presente",
    "past conditional": "condizionale passato",
    "conditional past": "condizionale passato",
    "pluperfect": "trapassato prossimo",
    "future perfect": "futuro anteriore"
  };
  return aliases[v] || v;
}
function nextQuestion() {
  clearQuizUrl();
  current = imported.length ? choice(imported) : (Math.random() < 0.35 ? choice(curatedQuestions) : makeLocalQuestion());
  sentence.textContent = current.sentence;
  counter.textContent = imported.length ? "Random imported sentence" : "Random generated sentence";
  renderAnswerControls();
  answered = false;
  gotThisOne = false;
  form.reset();
  resetAnswerState();
}
renderAnswerControls();
form.addEventListener("submit", event => {
  event.preventDefault();
  const person = selected("person");
  const tense = selected("tense");
  if (!person || !tense) return show("warn", "Pick one option in each group first.");
  explainButton.hidden = true;
  if (!answered) { attempts++; answered = true; }
  markCheckedAnswers(person, tense);
  showConjugation();
  if (person === current.person && tense === current.tense) {
    if (!gotThisOne) { correct++; gotThisOne = true; }
    show("correct", "Correct." + translationLine());
  } else {
    show("wrong", "Not quite. Correct answer: " + current.person + ", " + current.tense + "." + translationLine());
    explainButton.hidden = false;
  }
  updateScore();
});
explainButton.onclick = () => show("wrong", explainCurrent());
next.onclick = () => { resetAnswerState(); nextQuestion(); };
reset.onclick = () => { attempts = 0; correct = 0; updateScore(); nextQuestion(); };
copyPrompt.onclick = async () => {
  const prompt = 'Create 30 short Italian practice sentences as JSON only. Each item must have sentence, person, tense, verb, and translation. verb must be the infinitive, such as parlare, finire, dormire, or essere. Do not include explicit subject pronouns like io, tu, lui, lei, noi, voi, or loro in the Italian sentence. The person should be inferable from the verb form. Avoid ambiguous forms where two people have the same conjugation. person must be one of: io, tu, lui/lei, noi, voi, loro. tense must be one of: presente, presente progressivo, passato prossimo, imperfetto, trapassato prossimo, futuro semplice, futuro anteriore, condizionale presente, condizionale passato. Use varied common verbs and natural beginner/intermediate sentences.';
  await navigator.clipboard.writeText(prompt);
  show("correct", "Prompt copied. Paste it into ChatGPT, then paste the JSON result into the import box.");
};
importSentences.onclick = () => {
  try {
    const data = JSON.parse(importBox.value);
    imported = data.map(item => {
      const sentenceText = String(item.sentence || "").trim();
      const person = normalizePerson(item.person);
      const tense = normalizeTense(item.tense);
      const inferred = inferVerbFromSentence(sentenceText, tense, person);
      const verb = normalizeVerb(item.verb) || inferred.verb;
      const form = item.form || inferred.form;
      return { sentence: sentenceText, person, tense, verb, form, translation: String(item.translation || "") };
    }).filter(item => item.sentence && people.includes(item.person) && tenses.includes(item.tense));
    if (!imported.length) throw new Error("No valid sentences found");
    show("correct", "Imported " + imported.length + " ChatGPT sentences.");
    importBox.value = "";
    document.querySelector(".import-tools")?.removeAttribute("open");
    nextQuestion();
  } catch (error) {
    show("wrong", "I couldn't import that JSON. Make sure ChatGPT returns a plain array of sentence objects.");
  }
};
versionStamp.textContent = "Version " + APP_VERSION;
nextQuestion();
</script>
